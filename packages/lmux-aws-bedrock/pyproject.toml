[project]
name = "lmux-aws-bedrock"
version = "0.1.0"
description = "AWS Bedrock provider for lmux"
requires-python = ">=3.13"
license = "MIT"
dependencies = [
  "lmux",
  "boto3~=1.35",
]

[project.optional-dependencies]
async = ["aioboto3~=15.0"]

[tool.uv.sources]
lmux = { workspace = true }

[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"
