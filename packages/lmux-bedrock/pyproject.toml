[project]
name = "lmux-bedrock"
version = "0.1.0"
description = "AWS Bedrock provider for lmux"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
  "lmux",
  "boto3~=1.35",
]

[tool.uv.sources]
lmux = { workspace = true }

[build-system]
requires = ["uv_build>=0.10.7,<0.11.0"]
build-backend = "uv_build"
