[project]
name = "lmux-google"
version = "0.1.0"
description = "Google Vertex AI provider for lmux"
requires-python = ">=3.13"
license = "MIT"
dependencies = [
  "lmux",
  "google-genai~=1.0",
]

[tool.uv.sources]
lmux = { workspace = true }

[build-system]
requires = ["uv_build>=0.10.7,<0.11.0"]
build-backend = "uv_build"
